services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: angel-crm-backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATA_DIR=/app/data
      - JWT_SECRET=${JWT_SECRET:-angel-crm-change-me-in-production}
      - CLIENT_URL=http://localhost:8080
    volumes:
      - angel-crm-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: angel-crm-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  angel-crm-data:
    driver: local
